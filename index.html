<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DualEnergy · Field Cinematic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body {
    width: 100%;
    background: #EDECE7;
    color: #14443A;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     The scrollable container is 5× the viewport height.
     The visual layer is sticky-pinned to the viewport.
     ============================================================ */
  #scrollytelling {
    position: relative;
    height: 560vh;          /* 500vh cinematic + 60vh hold tail on the logo */
    width: 100%;
    background: #EDECE7;
  }
  /* Mobile / tablet portrait: shorter cinematic so it's not a marathon to scroll */
  @media (max-width: 900px) {
    #scrollytelling { height: 360vh; }  /* 320vh cinematic + 40vh hold tail */
  }
  #pinned {
    position: sticky;
    top: 0;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #EDECE7;
    /* Force hardware acceleration — fixes iOS Safari sticky jitter and
       improves overall touch-scroll smoothness on all mobile browsers */
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    will-change: transform;
  }
  #scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  #scene canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ============================================================
     Scroll hint at the start (fades out after first scroll)
     ============================================================ */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    color: #14443A;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.55;
    transition: opacity 0.6s ease;
    pointer-events: none;
    text-align: center;
  }
  .scroll-hint.hide { opacity: 0; }
  .scroll-hint .arrow {
    display: block;
    margin: 14px auto 0;
    width: 1px; height: 36px;
    background: linear-gradient(to bottom, rgba(20,68,58,0.5), rgba(20,68,58,0));
    animation: scrollPulse 1.8s ease-in-out infinite;
  }
  @keyframes scrollPulse {
    0%, 100% { transform: scaleY(1); opacity: 0.7; }
    50%      { transform: scaleY(0.5) translateY(8px); opacity: 0.2; }
  }

  /* ============================================================
     Logo reveal — fixed in viewport, opacity driven by scroll
     ============================================================ */
  .logo-reveal {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .logo-reveal .logo-wrap {
    width: min(620px, 78vw);
    transform: scale(0.92) translateY(12px);
    transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .logo-reveal.show .logo-wrap {
    transform: scale(1) translateY(0);
  }
  .logo-reveal svg {
    width: 100%;
    height: auto;
    display: block;
  }
  /* ============================================================
     Typing reveal — appears just before the logo, types out a line,
     then cross-fades into the logo.
     ============================================================ */
  .typing-reveal {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    padding: 0 24px;
  }
  .typing-text {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(24px, 3vw, 44px);
    color: #14443A;
    letter-spacing: 0.01em;
    line-height: 1.3;
    text-align: center;
    max-width: 90vw;
  }
  .typing-text .typed { white-space: pre-wrap; }
  .typing-text .caret {
    display: inline-block;
    width: 2px;
    height: 0.95em;
    background: #14443A;
    margin-left: 4px;
    vertical-align: -2px;
    animation: caretBlink 0.85s steps(2, start) infinite;
  }
  .typing-reveal.done .caret {
    opacity: 0;
    animation: none;
    transition: opacity 0.35s ease;
  }
  @keyframes caretBlink {
    50% { opacity: 0; }
  }

  /* Dim overlay that fades in behind logo (driven by scroll) */
  .scene-dim {
    position: absolute;
    inset: 0;
    z-index: 8;
    background: #EDECE7;
    opacity: 0;
    pointer-events: none;
  }
</style>

{
  "imports": {

<script type="module">
import * as THREE from 'three';

(function initCinematicScene() {
  // ============================================================
  // DEVICE CLASS DETECTION
  //
  // Three tiers of device:
  //   - 'desktop': big screen, mouse, plenty of GPU
  //   - 'tablet':  medium screen, touch, moderate GPU
  //   - 'phone':   small screen, touch, often constrained GPU
  //
  // We use viewport width + pointer media query, not user-agent
  // sniffing (which is unreliable). Hardware concurrency is the
  // tie-breaker for tablets that *might* be low-spec.
  // ============================================================
  const vw = window.innerWidth;
  const coarsePointer = window.matchMedia('(pointer: coarse)').matches;
  const cores = navigator.hardwareConcurrency || 4;

  let deviceClass;
  if (vw < 700)                              deviceClass = 'phone';
  else if (vw < 1100 && coarsePointer)       deviceClass = 'tablet';
  else if (coarsePointer && cores <= 4)      deviceClass = 'tablet';
  else                                       deviceClass = 'desktop';

  const isPhone   = deviceClass === 'phone';
  const isTablet  = deviceClass === 'tablet';

  // ============================================================
  // CONFIG  (adaptive by device class)
  // ============================================================
  const CONFIG = {
    containerId: 'scene',

    // Field — wider for the bird's-eye opening to sell scale (multiple
    // hectares, not a single plot). Rows extend into the haze.
    rows: 5,
    cols: 10,
    rowSpacing: 6.2,
    colSpacing: 3.0,

    // Panel motion (subtle)
    baseTilt: 0.32,
    trackingSway: 0.05,
    trackingSpeed: 0.10,

    // Crops — slightly thinned on mobile to keep memory + draw calls in check
    cropStripCount: isPhone ? 7 : 9,
    cropPatchesPerStrip: isPhone ? 16 : (isTablet ? 20 : 24),

    // Performance — adaptive
    shadowsEnabled: !isPhone,
    shadowMapSize: isPhone ? 0 : (isTablet ? 1024 : 2048),
    pixelRatio: isPhone
      ? Math.min(window.devicePixelRatio, 1.5)
      : Math.min(window.devicePixelRatio, 2),

    // Data layer — skip the heaviest particle work on phones
    dataTrails: !isPhone,        // 170+ ascending particles → mobile killer
    trackerLEDs: true,           // small + cheap, keep on all devices
    groundRipples: !isPhone,     // 18 transparent meshes → noticeable on weak GPUs

    // Grain plants — fewer on smaller devices
    fieldGrainDensity: isPhone ? 1.5 : (isTablet ? 2 : 3),

    // Scroll smoothing — lower = more "filmic" lag, higher = snappier
    scrollDamping: 0.075,
  };

  // ============================================================
  // COLORS  (same brand palette as before)
  // ============================================================
  const COLORS = {
    panelFace:   '#3A3D42',
    panelFrame:  '#1F2125',
    panelLine:   '#15171A',
    pole:        '#4A4D52',
    sensorStake: '#8A8E93',
    sensorBox:   '#A8ACB1',
    lime:        '#8FE82A',
    limeDark:    '#0E5747',
    limeMid:     '#3DA638',
    cream:       '#EDECE7',
    sunWarm:     '#FFF4D9',
  };

  // ============================================================
  // CAMERA KEYFRAMES — gentle continuous descent + approach
  //
  // No side-switches, no dramatic swoops. The camera follows one
  // smooth arc: high overhead → gradual descent staying on one
  // side of the field → low approach under a panel where a grain
  // plant grows into the foreground → gentle pull back for the
  // logo reveal.
  // ============================================================
  const cameraKeyframes = [
    { t: 0.00, pos: [ 0,  52, 0.01], target: [ 0,   0,   0  ], fov: 52 },  // higher overhead
    { t: 0.15, pos: [ 4,  46, 6   ], target: [ 0,   0.3, 1.5], fov: 50 },  // gentle drift
    { t: 0.32, pos: [ 8,  32, 12  ], target: [ 1,   0.7, 3  ], fov: 47 },  // gradual descent
    { t: 0.50, pos: [ 7,  16, 12  ], target: [ 2,   1.3, 4  ], fov: 43 },  // mid-altitude oblique
    { t: 0.65, pos: [ 4,   7,  10 ], target: [ 2,   1.7, 5  ], fov: 39 },  // gentle approach
    { t: 0.78, pos: [ 3,  1.9, 7.5], target: [ 2,   1.6, 5.2], fov: 36 },  // under-panel, plant in foreground
    { t: 0.88, pos: [ 3.5, 5,   11], target: [ 1.5, 1.2, 3  ], fov: 39 },  // gentle pull up
    { t: 1.00, pos: [ 0,  10,  17 ], target: [ 0,   1,   0  ], fov: 43 },  // final wide for logo
  ];

  // ============================================================
  // CONTAINER
  // ============================================================
  const container = document.getElementById(CONFIG.containerId);
  let w = container.clientWidth || window.innerWidth;
  let h = container.clientHeight || window.innerHeight;

  // ============================================================
  // SCENE
  // ============================================================
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(COLORS.cream);
  scene.fog = new THREE.Fog(COLORS.cream, 35, 110);

  // ============================================================
  // CAMERA
  // ============================================================
  const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 200);
  const initialKey = cameraKeyframes[0];
  camera.position.set(...initialKey.pos);
  camera.lookAt(new THREE.Vector3(...initialKey.target));

  // ============================================================
  // RENDERER
  // ============================================================
  const renderer = new THREE.WebGLRenderer({ antialias: !isPhone, alpha: false });
  renderer.setSize(w, h);
  renderer.setPixelRatio(CONFIG.pixelRatio);
  renderer.shadowMap.enabled = CONFIG.shadowsEnabled;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  container.appendChild(renderer.domElement);

  // ============================================================
  // LIGHTING
  // ============================================================
  const sun = new THREE.DirectionalLight(COLORS.sunWarm, 1.8);
  sun.position.set(11, 18, 7);
  if (CONFIG.shadowsEnabled) {
    sun.castShadow = true;
    sun.shadow.mapSize.set(CONFIG.shadowMapSize, CONFIG.shadowMapSize);
    sun.shadow.camera.left = -32;
    sun.shadow.camera.right = 32;
    sun.shadow.camera.top = 28;
    sun.shadow.camera.bottom = -28;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 60;
    sun.shadow.bias = -0.0005;
    sun.shadow.normalBias = 0.02;
  }
  scene.add(sun);

  // On phones (shadows off) we boost ambient+hemisphere to compensate
  // for the lost contrast that shadows would normally provide
  const hemiIntensity    = CONFIG.shadowsEnabled ? 0.50 : 0.70;
  const ambientIntensity = CONFIG.shadowsEnabled ? 0.18 : 0.32;
  scene.add(new THREE.HemisphereLight('#FFFFFF', COLORS.limeDark, hemiIntensity));
  scene.add(new THREE.AmbientLight('#FFFFFF', ambientIntensity));

  // ============================================================
  // GROUND
  // ============================================================
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(220, 220),
    new THREE.MeshStandardMaterial({
      color: COLORS.cream, roughness: 0.96, metalness: 0,
    }),
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ============================================================
  // SHARED MATERIALS
  // ============================================================
  const matPanel       = new THREE.MeshStandardMaterial({ color: COLORS.panelFace,  roughness: 0.42, metalness: 0.32 });
  const matFrame       = new THREE.MeshStandardMaterial({ color: COLORS.panelFrame, roughness: 0.55, metalness: 0.42 });
  const matCellLine    = new THREE.MeshStandardMaterial({ color: COLORS.panelLine,  roughness: 0.80, metalness: 0    });
  const matPole        = new THREE.MeshStandardMaterial({ color: COLORS.pole,        roughness: 0.65, metalness: 0.35 });
  const matSensorStake = new THREE.MeshStandardMaterial({ color: COLORS.sensorStake, roughness: 0.65, metalness: 0.35 });
  const matSensorBox   = new THREE.MeshStandardMaterial({ color: COLORS.sensorBox,   roughness: 0.55, metalness: 0.4  });
  const matSensorLED   = new THREE.MeshStandardMaterial({
    color: COLORS.lime, emissive: COLORS.lime, emissiveIntensity: 0.6,
    roughness: 0.3, metalness: 0,
  });
  const matCropLime     = new THREE.MeshStandardMaterial({ color: COLORS.lime,     roughness: 0.85, metalness: 0, flatShading: true });
  const matCropLimeDark = new THREE.MeshStandardMaterial({ color: COLORS.limeDark, roughness: 0.85, metalness: 0, flatShading: true });
  const matCropLimeMid  = new THREE.MeshStandardMaterial({ color: COLORS.limeMid,  roughness: 0.85, metalness: 0, flatShading: true });

  // Grain plant materials — the hero plant that grows under a panel
  const matGrainStem  = new THREE.MeshStandardMaterial({ color: '#4A7A1F', roughness: 0.85, metalness: 0, flatShading: true });
  const matGrainLeaf  = new THREE.MeshStandardMaterial({ color: '#6FB52A', roughness: 0.85, metalness: 0, flatShading: true, side: THREE.DoubleSide });
  const matGrainHead  = new THREE.MeshStandardMaterial({ color: '#E8C547', roughness: 0.78, metalness: 0, flatShading: true });
  const matGrainSpike = new THREE.MeshStandardMaterial({ color: '#D4A82A', roughness: 0.78, metalness: 0, flatShading: true });

  // ============================================================
  // TRACKER FACTORY
  // ============================================================
  function createTracker() {
    const group = new THREE.Group();
    const POLE_H = 2.1;

    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.07, 0.07, POLE_H, 14),
      matPole,
    );
    pole.position.y = POLE_H / 2;
    pole.castShadow = true;
    group.add(pole);

    const pivot = new THREE.Group();
    pivot.position.y = POLE_H + 0.05;

    const tube = new THREE.Mesh(
      new THREE.CylinderGeometry(0.045, 0.045, 2.5, 12),
      matFrame,
    );
    tube.rotation.z = Math.PI / 2;
    tube.castShadow = true;
    pivot.add(tube);

    const PANEL_W = 2.35, PANEL_D = 0.06, PANEL_H = 1.18;
    const panel = new THREE.Mesh(
      new THREE.BoxGeometry(PANEL_W, PANEL_D, PANEL_H),
      matPanel,
    );
    panel.castShadow = true;
    panel.receiveShadow = true;
    pivot.add(panel);

    const lineY = PANEL_D / 2 + 0.002;
    for (let i = 1; i < 6; i++) {
      const x = -PANEL_W / 2 + (PANEL_W * i / 6);
      const ln = new THREE.Mesh(
        new THREE.BoxGeometry(0.012, 0.002, PANEL_H * 0.94),
        matCellLine,
      );
      ln.position.set(x, lineY, 0);
      pivot.add(ln);
    }
    const hline = new THREE.Mesh(
      new THREE.BoxGeometry(PANEL_W * 0.94, 0.002, 0.012),
      matCellLine,
    );
    hline.position.set(0, lineY, 0);
    pivot.add(hline);

    group.add(pivot);
    group.userData.pivot = pivot;
    return group;
  }

  // ============================================================
  // SENSOR BOX FACTORY
  // ============================================================
  function createSensorBox() {
    const group = new THREE.Group();
    const STAKE_H = 0.6;

    const stake = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, STAKE_H, 8),
      matSensorStake,
    );
    stake.position.y = STAKE_H / 2;
    stake.castShadow = true;
    group.add(stake);

    const ENC_W = 0.42, ENC_H = 0.26, ENC_D = 0.18;
    const enc = new THREE.Mesh(
      new THREE.BoxGeometry(ENC_W, ENC_H, ENC_D),
      matSensorBox,
    );
    enc.position.y = STAKE_H + ENC_H / 2;
    enc.castShadow = true;
    enc.receiveShadow = true;
    group.add(enc);

    const led = new THREE.Mesh(
      new THREE.SphereGeometry(0.024, 12, 12),
      matSensorLED.clone(),
    );
    led.position.set(ENC_W / 2 - 0.08, STAKE_H + ENC_H / 2 + 0.02, ENC_D / 2 + 0.001);
    group.add(led);

    const tinySolar = new THREE.Mesh(
      new THREE.BoxGeometry(0.30, 0.012, 0.15),
      matPanel,
    );
    tinySolar.position.set(0.04, STAKE_H + ENC_H + 0.02, 0);
    tinySolar.rotation.x = -0.18;
    tinySolar.castShadow = true;
    group.add(tinySolar);

    const ANT_H = 0.22;
    const ant = new THREE.Mesh(
      new THREE.CylinderGeometry(0.005, 0.005, ANT_H, 6),
      matSensorStake,
    );
    ant.position.set(-ENC_W / 2 + 0.04, STAKE_H + ENC_H + ANT_H / 2, 0);
    ant.castShadow = true;
    group.add(ant);

    const antTip = new THREE.Mesh(
      new THREE.SphereGeometry(0.014, 10, 10),
      matSensorLED.clone(),
    );
    antTip.position.set(-ENC_W / 2 + 0.04, STAKE_H + ENC_H + ANT_H, 0);
    group.add(antTip);

    group.userData.leds = [led, antTip];
    return group;
  }

  // ============================================================
  // GRAIN PLANT FACTORY — the plant that grows under the panel
  //
  // Stylized wheat/barley: tapered stem, 4 leaves, ovoid grain
  // head at the top with spikelet details. Designed to read at
  // close camera range (~2m away).
  // ============================================================
  function createGrainPlant() {
    const group = new THREE.Group();
    const STEM_H = 1.05;

    // Stem (slightly tapered top to bottom)
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.014, 0.020, STEM_H, 7),
      matGrainStem,
    );
    stem.position.y = STEM_H / 2;
    stem.castShadow = true;
    group.add(stem);

    // Leaves — elongated thin boxes angled outward at varying heights
    const leafSpecs = [
      { y: 0.20, az: 0.0,         tilt: 0.65, len: 0.36 },
      { y: 0.35, az: Math.PI * 0.7, tilt: 0.55, len: 0.32 },
      { y: 0.50, az: Math.PI * 1.3, tilt: 0.50, len: 0.30 },
      { y: 0.65, az: Math.PI * 0.2, tilt: 0.45, len: 0.26 },
    ];
    for (const ls of leafSpecs) {
      const leaf = new THREE.Mesh(
        new THREE.BoxGeometry(0.025, ls.len, 0.005),
        matGrainLeaf,
      );
      // Orient: leaf extends "up and out" from stem
      // Pivot at the base end, so place geometry shifted up by len/2 and
      // rotate from that base point
      const leafGroup = new THREE.Group();
      leaf.position.y = ls.len / 2;
      leafGroup.add(leaf);

      // Position around stem
      leafGroup.position.set(
        Math.cos(ls.az) * 0.022,
        ls.y,
        Math.sin(ls.az) * 0.022,
      );
      // Tilt outward + rotate around stem axis
      leafGroup.rotation.y = ls.az + Math.PI / 2;
      leafGroup.rotation.x = ls.tilt;
      leaf.castShadow = true;
      group.add(leafGroup);
    }

    // Grain head — ovoid sphere at top of stem
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 10, 8),
      matGrainHead,
    );
    head.position.y = STEM_H + 0.10;
    head.scale.set(0.7, 2.0, 0.7);  // elongated vertically
    head.castShadow = true;
    group.add(head);

    // Spikelets — small outward-pointing cones around the head
    const N_SPIKES = 8;
    for (let i = 0; i < N_SPIKES; i++) {
      const angle = (i / N_SPIKES) * Math.PI * 2;
      const y = STEM_H + 0.04 + (i % 2) * 0.07;
      const spike = new THREE.Mesh(
        new THREE.ConeGeometry(0.012, 0.06, 4),
        matGrainSpike,
      );
      spike.position.set(
        Math.cos(angle) * 0.045,
        y,
        Math.sin(angle) * 0.045,
      );
      // Point outward + slightly up
      spike.rotation.z = -Math.PI / 2 + 0.4;
      spike.rotation.y = -angle;
      spike.castShadow = true;
      group.add(spike);
    }

    return group;
  }

  // ============================================================
  // PLACE TRACKERS (wider field for bird's-eye intro)
  // ============================================================
  const trackers = [];
  for (let r = 0; r < CONFIG.rows; r++) {
    for (let c = 0; c < CONFIG.cols; c++) {
      const t = createTracker();
      t.position.set(
        (c - (CONFIG.cols - 1) / 2) * CONFIG.colSpacing,
        0,
        (r - (CONFIG.rows - 1) / 2) * CONFIG.rowSpacing,
      );
      // Tiny per-tracker tilt offset for variety
      t.userData.tiltOffset = (Math.random() - 0.5) * 0.06;
      scene.add(t);
      trackers.push(t);
    }
  }

  // ============================================================
  // CROPS
  // ============================================================
  function makeCropMesh(material) {
    const r = 0.18 + Math.random() * 0.16;
    const m = new THREE.Mesh(new THREE.IcosahedronGeometry(r, 0), material);
    m.scale.y = 0.6 + Math.random() * 0.4;
    m.rotation.y = Math.random() * Math.PI * 2;
    m.rotation.x = (Math.random() - 0.5) * 0.3;
    m.castShadow = true;
    m.receiveShadow = true;
    m.userData.radius = r;
    return m;
  }

  function createCropPatch(material) {
    const group = new THREE.Group();
    const n = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const m = makeCropMesh(material);
      m.position.set(
        (Math.random() - 0.5) * 1.1,
        m.userData.radius * m.scale.y * 0.7,
        (Math.random() - 0.5) * 0.55,
      );
      group.add(m);
    }
    return group;
  }

  const CROP_MATS = [matCropLime, matCropLimeDark, matCropLimeMid];
  const stripStep = CONFIG.rowSpacing / 2;

  for (let s = 0; s < CONFIG.cropStripCount; s++) {
    const z = (s - (CONFIG.cropStripCount - 1) / 2) * stripStep;
    for (let i = 0; i < CONFIG.cropPatchesPerStrip; i++) {
      const x = (i - (CONFIG.cropPatchesPerStrip - 1) / 2) * 1.35
              + (Math.random() - 0.5) * 0.45;
      const mat = CROP_MATS[(s * 7 + i * 3) % CROP_MATS.length];
      const patch = createCropPatch(mat);
      patch.position.set(
        x,
        0,
        z + (Math.random() - 0.5) * 0.9,
      );
      scene.add(patch);
    }
  }

  // ============================================================
  // SENSOR BOXES — distributed across the (now wider) field.
  // Keep one near the camera focal point (~x=2, z=5) so the
  // close-up segment has a sensor in frame.
  // ============================================================
  const sensorBoxes = [];
  const sensorPlacements = [
    // Hero one — visible in close-up shot (camera target at (2, 1.6, 5.2))
    { x:  2.4, z:  6.0,  r: -0.30 },
    // Spread across the field
    { x: -2.6, z: -0.5,  r:  0.55 },
    { x:  5.8, z:  5.5,  r:  0.30 },
    { x: -5.0, z:  0.7,  r: -0.45 },
    { x:  8.2, z: -3.5,  r:  0.10 },
    { x: -8.5, z: -6.0,  r:  0.85 },
    { x:  0.0, z: -9.0,  r: -0.20 },
    { x: 10.5, z:  9.0,  r:  0.40 },
    { x: -3.2, z: 10.5,  r: -0.80 },
  ];
  for (const p of sensorPlacements) {
    const sb = createSensorBox();
    sb.position.set(p.x, 0, p.z);
    sb.rotation.y = p.r;
    scene.add(sb);
    sensorBoxes.push(sb);
  }

  const allLEDs = [];
  sensorBoxes.forEach((sb, idx) => {
    sb.userData.leds.forEach((led, j) => {
      led.userData.phase = idx * 1.7 + j * 0.9;
      allLEDs.push(led);
    });
  });

  // ============================================================
  // GRAIN PLANT — positioned where the camera approaches close
  // at progress ~0.78. The camera target there is (2, 1.6, 5.2),
  // so the plant sits in the foreground of that framing.
  // It grows in via scale animation between progress 0.55 → 0.80.
  // ============================================================
  const grainPlant = createGrainPlant();
  grainPlant.position.set(2, 0, 5.2);
  grainPlant.scale.setScalar(0.001);  // starts invisible
  scene.add(grainPlant);

  // A second smaller grain plant nearby for visual richness
  const grainPlant2 = createGrainPlant();
  grainPlant2.position.set(2.35, 0, 4.85);
  grainPlant2.rotation.y = 1.2;
  grainPlant2.scale.setScalar(0.001);
  scene.add(grainPlant2);

  // A third even smaller one to break the symmetry
  const grainPlant3 = createGrainPlant();
  grainPlant3.position.set(1.7, 0, 5.5);
  grainPlant3.rotation.y = -0.6;
  grainPlant3.scale.setScalar(0.001);
  scene.add(grainPlant3);

  const grainPlants = [grainPlant, grainPlant2, grainPlant3];

  // ============================================================
  // FIELD GRAIN — additional grain plants scattered across the
  // whole field, between tracker rows and in the strips between
  // panels. These don't grow on scroll (only the close-up trio
  // does); they're static and already full-grown, giving the
  // bird's-eye view a sense of an active cultivated field.
  // ============================================================
  const FIELD_GRAIN_DENSITY = CONFIG.fieldGrainDensity;
  const fieldGrainStrips = CONFIG.cropStripCount;
  const fieldGrainStripStep = CONFIG.rowSpacing / 2;

  for (let s = 0; s < fieldGrainStrips; s++) {
    const z = (s - (fieldGrainStrips - 1) / 2) * fieldGrainStripStep;
    for (let c = 0; c < CONFIG.cols * FIELD_GRAIN_DENSITY; c++) {
      const xBase = (c / FIELD_GRAIN_DENSITY - (CONFIG.cols - 1) / 2) * CONFIG.colSpacing;
      const x = xBase + (Math.random() - 0.5) * (CONFIG.colSpacing * 0.6);
      const zJitter = z + (Math.random() - 0.5) * 1.0;

      // Skip grain plants that would land on the close-up trio's spot
      // (radius 1.5 around x=2, z=5.2) so the hero plants stay clear
      const dx = x - 2;
      const dz = zJitter - 5.2;
      if (dx * dx + dz * dz < 1.5 * 1.5) continue;

      // Skip if very close to a tracker pole
      let tooCloseToPole = false;
      for (const tr of trackers) {
        const pdx = x - tr.position.x;
        const pdz = zJitter - tr.position.z;
        if (pdx * pdx + pdz * pdz < 0.25 * 0.25) {
          tooCloseToPole = true;
          break;
        }
      }
      if (tooCloseToPole) continue;

      // Skip if close to a sensor box
      let tooCloseToSensor = false;
      for (const sb of sensorBoxes) {
        const sdx = x - sb.position.x;
        const sdz = zJitter - sb.position.z;
        if (sdx * sdx + sdz * sdz < 0.5 * 0.5) {
          tooCloseToSensor = true;
          break;
        }
      }
      if (tooCloseToSensor) continue;

      const plant = createGrainPlant();
      plant.position.set(x, 0, zJitter);
      plant.rotation.y = Math.random() * Math.PI * 2;
      // Subtle scale variation — most around 0.65, some smaller for variety
      const scale = 0.55 + Math.random() * 0.25;
      plant.scale.setScalar(scale);
      scene.add(plant);
    }
  }

  // ============================================================
  // DATA LAYER — the telemetry / engine visualization.
  //
  // This is what tells the viewer this is a *predictive
  // infrastructure*, not just a pretty farm. Three components:
  //
  //   1. Tracker status LEDs — small lime dots at the base of
  //      every panel pole, pulsing out of phase. Reads as "every
  //      panel is instrumented".
  //   2. Data trails — vertical particle streams rising from
  //      sensor boxes and a subset of trackers. Lime points
  //      fading as they ascend. Reads as "data flowing up".
  //   3. Ground ripples — subtle expanding rings on the ground
  //      at sensor positions. Reads as "the engine sensing".
  // ============================================================

  const dataLayerObjects = [];  // store animated parts for the tick loop

  // ---- 1. Tracker status LEDs ----
  const matTrackerLED = new THREE.MeshStandardMaterial({
    color: COLORS.lime, emissive: COLORS.lime, emissiveIntensity: 0.7,
    roughness: 0.3, metalness: 0,
  });
  trackers.forEach((tr, idx) => {
    const led = new THREE.Mesh(
      new THREE.SphereGeometry(0.045, 8, 8),
      matTrackerLED.clone(),
    );
    led.position.set(tr.position.x + 0.10, 0.22, tr.position.z);
    led.userData.phase = idx * 0.37;
    scene.add(led);
    dataLayerObjects.push({ kind: 'trackerLED', mesh: led });
  });

  // ---- 2. Data trail factory ----
  // Each trail is a column of N small lime spheres that ascend and
  // fade. We pre-build all spheres once and animate their Y + opacity
  // in the tick loop so they read as continuous streaming particles.
  function createDataTrail(originX, originZ, height = 6.0, particleCount = 7) {
    const particles = [];
    const matTrailParticle = new THREE.MeshBasicMaterial({
      color: COLORS.lime, transparent: true, opacity: 0.8,
    });
    for (let i = 0; i < particleCount; i++) {
      const p = new THREE.Mesh(
        new THREE.SphereGeometry(0.045, 6, 6),
        matTrailParticle.clone(),
      );
      p.position.set(originX, 0.3, originZ);
      // Stagger their starting phase so they're spread along the trail
      p.userData.basePhase = i / particleCount;
      p.userData.originX = originX;
      p.userData.originZ = originZ;
      p.userData.height = height;
      scene.add(p);
      particles.push(p);
    }
    return particles;
  }

  // Trails rising from each sensor box (the obvious "transmission" gesture)
  // Skipped on phones to save ~170 particles + 18 transparent meshes worth
  // of overdraw cost. The tracker LEDs still pulse, so the instrumentation
  // story still reads, just without the rising columns.
  if (CONFIG.dataTrails) {
    sensorBoxes.forEach((sb) => {
      const particles = createDataTrail(sb.position.x, sb.position.z, 7.5, 9);
      dataLayerObjects.push({ kind: 'trail', particles, speed: 0.18 });
    });

    // Trails rising from a subset of trackers (every 4th one) — every panel
    // is instrumented, but trails on every one would be visually noisy
    trackers.forEach((tr, idx) => {
      if (idx % 4 !== 0) return;
      const particles = createDataTrail(
        tr.position.x + 0.30,  // slight offset from pole
        tr.position.z + 0.10,
        6.0,
        7,
      );
      dataLayerObjects.push({ kind: 'trail', particles, speed: 0.15 });
    });
  }

  // ---- 3. Ground ripple rings at sensor positions ----
  // Each sensor gets 2 rings expanding outward, staggered.
  // Transparent meshes are expensive on mobile GPUs (forced overdraw +
  // depth-sort) so we skip on phones.
  if (CONFIG.groundRipples) {
    const matGroundRipple = new THREE.MeshBasicMaterial({
      color: COLORS.lime, transparent: true, opacity: 0.6,
      side: THREE.DoubleSide,
    });
    sensorBoxes.forEach((sb, idx) => {
      for (let r = 0; r < 2; r++) {
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(0.4, 0.42, 48),
          matGroundRipple.clone(),
        );
        ring.rotation.x = -Math.PI / 2;
        ring.position.set(sb.position.x, 0.01, sb.position.z);
        ring.userData.phaseOffset = r * 0.5 + idx * 0.23;
        ring.userData.maxRadius = 2.6;
        scene.add(ring);
        dataLayerObjects.push({ kind: 'ripple', mesh: ring });
      }
    });
  }

  // ============================================================
  // SCROLL → PROGRESS
  // ============================================================
  let targetProgress = 0;
  let smoothProgress = 0;
  const scrollContainer = document.getElementById('scrollytelling');

  // Detect if this scene is embedded as an iframe inside another page.
  // If yes, listen for scroll-progress messages from the parent and
  // disable our own internal scroll tracker. This lets the parent
  // (Webflow page) drive the camera.
  const isEmbedded = window.parent !== window;

  // Trailing scroll distance during which progress stays clamped at 1.0
  // so the final logo composition lingers naturally before the sticky
  // scene releases. Smaller on mobile where the whole scroll is shorter.
  const HOLD_TAIL_VH = window.innerWidth <= 900 ? 40 : 60;

  function updateScrollProgress() {
    const total = scrollContainer.offsetHeight - window.innerHeight;
    if (total <= 0) { targetProgress = 0; return; }
    const holdPx = (HOLD_TAIL_VH * window.innerHeight) / 100;
    const usable = Math.max(1, total - holdPx);
    targetProgress = Math.max(0, Math.min(1, window.scrollY / usable));
  }

  if (isEmbedded) {
    // Listen for parent scroll progress. Expected message shape:
    //   { type: 'scrollProgress', progress: 0..1 }
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (data && data.type === 'scrollProgress' && typeof data.progress === 'number') {
        targetProgress = Math.max(0, Math.min(1, data.progress));
      }
    });
    // Hide the internal scroll hint when parent-controlled
    const hintEl = document.getElementById('scrollHint');
    if (hintEl) hintEl.style.display = 'none';
    // Signal to parent we're ready
    try {
      window.parent.postMessage({ type: 'sceneReady' }, '*');
    } catch (e) { /* ignore cross-origin warning, parent may still receive */ }
  } else {
    // Standalone mode — use our own scroll listener
    window.addEventListener('scroll', () => {
      updateScrollProgress();
      if (window.scrollY > 30) hint.classList.add('hide');
    }, { passive: true });
  }

  // ============================================================
  // CAMERA INTERPOLATION
  //
  // We build two CatmullRomCurve3 splines — one for camera
  // position, one for look-target. CatmullRom gives C1
  // continuity (smooth velocity through every keyframe), which
  // is what gives the motion its cinematic feel vs the
  // direction-change kinks you get from linear segment-by-
  // segment lerping.
  //
  // We use 'centripetal' parameterization to prevent overshoot
  // and loop-back artifacts at sharper direction changes.
  //
  // Because our keyframes have non-uniform time stamps but the
  // curve uses uniform u-parameter (each control point at
  // u = i / (n-1)), we remap scroll-progress → curve-u so the
  // original timing is preserved.
  // ============================================================
  const positionCurve = new THREE.CatmullRomCurve3(
    cameraKeyframes.map(k => new THREE.Vector3(...k.pos)),
    false,           // not closed
    'centripetal',   // tension type — safest for camera paths
    0.5,
  );
  const targetCurve = new THREE.CatmullRomCurve3(
    cameraKeyframes.map(k => new THREE.Vector3(...k.target)),
    false,
    'centripetal',
    0.5,
  );

  function smoothstep(t) { return t * t * (3 - 2 * t); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // Remap scroll progress (using keyframe t values) onto the
  // curve's uniform parameter space.
  function progressToCurveU(p) {
    const n = cameraKeyframes.length;
    let i = 0;
    while (i < n - 1 && cameraKeyframes[i + 1].t <= p) i++;
    if (i >= n - 1) return 1;
    const a = cameraKeyframes[i];
    const b = cameraKeyframes[i + 1];
    const span = (b.t - a.t) || 1;
    const localT = Math.max(0, Math.min(1, (p - a.t) / span));
    // Smoothstep the local segment too — subtle, takes the edge off
    // segment-boundary velocity changes
    const eased = smoothstep(localT);
    return (i + eased) / (n - 1);
  }

  // Reusable vectors to avoid allocations every frame
  const _posVec = new THREE.Vector3();
  const _tgtVec = new THREE.Vector3();
  const _viewDir = new THREE.Vector3();

  function applyCameraForProgress(p) {
    const u = progressToCurveU(p);

    positionCurve.getPoint(u, _posVec);
    targetCurve.getPoint(u, _tgtVec);

    // ============================================================
    // Aspect-aware portrait correction.
    //
    // Camera keyframes were composed for landscape (~16:9). On a
    // portrait phone (~9:16), the same camera position frames a
    // narrower horizontal slice — subjects get clipped. We
    // compensate by:
    //   - Pulling the camera back along the view direction
    //   - Widening the FOV
    //
    // The two together preserve roughly the same vertical framing
    // while expanding the horizontal field-of-view, so the
    // landscape composition still fits the portrait viewport.
    //
    // Effect smoothly cancels as aspect approaches 1 (square) and
    // is zero at aspect ≥ 1 (landscape).
    // ============================================================
    const aspect = camera.aspect;
    let portraitFactor = 0;
    if (aspect < 1.0) {
      // 0 at aspect=1.0, 1 at aspect=0.5 (very tall phone portrait)
      portraitFactor = Math.min(1, (1.0 - aspect) / 0.5);
    }

    if (portraitFactor > 0) {
      // Pull camera back from target along the view direction
      _viewDir.subVectors(_posVec, _tgtVec);
      const pullback = 1.0 + (0.35 * portraitFactor);  // up to +35% distance
      _viewDir.multiplyScalar(pullback);
      _posVec.copy(_tgtVec).add(_viewDir);
    }

    camera.position.copy(_posVec);
    camera.lookAt(_tgtVec);

    // FOV — simple eased interpolation (no curve needed for a scalar)
    let i = 0;
    while (i < cameraKeyframes.length - 1 && cameraKeyframes[i + 1].t <= p) i++;
    let baseFov;
    if (i >= cameraKeyframes.length - 1) {
      baseFov = cameraKeyframes[cameraKeyframes.length - 1].fov;
    } else {
      const a = cameraKeyframes[i];
      const b = cameraKeyframes[i + 1];
      const localT = (p - a.t) / ((b.t - a.t) || 1);
      const eased = smoothstep(Math.max(0, Math.min(1, localT)));
      baseFov = lerp(a.fov, b.fov, eased);
    }
    // Widen FOV on portrait for the same reason — preserve framing
    camera.fov = baseFov + (6 * portraitFactor);
    camera.updateProjectionMatrix();
  }

  // ============================================================
  // CAPTIONS + LOGO REVEAL — driven by scroll progress
  // ============================================================
  const hint     = document.getElementById('scrollHint');
  const dim      = document.getElementById('sceneDim');
  const logo     = document.getElementById('logoReveal');
  const typing   = document.getElementById('typingReveal');
  const typed    = document.getElementById('typedText');

  // Time-based typewriter, triggered by scroll entering the typing zone.
  // Held in module scope so we can resume/reset across scroll direction
  // changes without races.
  const TYPING_TEXT     = 'Unlock the power of Agrivoltaics';
  const TYPING_SPEED_MS = 55;
  let typingTimer = null;
  let typingDone  = false;

  function startTyping() {
    if (typingTimer || typingDone) return;
    let i = typed.textContent.length;  // resume if partially typed
    typing.classList.remove('done');
    typingTimer = setInterval(() => {
      i++;
      typed.textContent = TYPING_TEXT.slice(0, i);
      if (i >= TYPING_TEXT.length) {
        clearInterval(typingTimer);
        typingTimer = null;
        typingDone = true;
        // Let the cursor blink for a beat before it fades
        setTimeout(() => typing.classList.add('done'), 650);
      }
    }, TYPING_SPEED_MS);
  }

  function resetTyping() {
    if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
    typed.textContent = '';
    typingDone = false;
    typing.classList.remove('done');
  }

  function applyOverlaysForProgress(p) {
    // Dim overlay starts fading in after 78%, reaches ~65% by end
    const dimP = Math.max(0, (p - 0.78) / 0.22);
    dim.style.opacity = (dimP * 0.65).toFixed(3);

    // Typing container fades in 0.80 → 0.84
    const typingFadeIn = Math.max(0, Math.min(1, (p - 0.80) / 0.04));
    // Logo fades in 0.92 → 1.0 and the typing cross-fades out in the same window
    const logoP        = Math.max(0, Math.min(1, (p - 0.92) / 0.08));

    typing.style.opacity = (typingFadeIn * (1 - logoP)).toFixed(3);
    logo.style.opacity   = logoP.toFixed(3);
    logo.classList.toggle('show', logoP > 0.5);

    // Kick off the typewriter once the text is visible; reset if the user
    // scrolls back out of the zone so the effect plays fresh on re-entry.
    if (typingFadeIn > 0.5) {
      startTyping();
    } else if (p < 0.78) {
      resetTyping();
    }
  }

  // ============================================================
  // RESIZE
  // ============================================================
  const ro = new ResizeObserver(() => {
    const newW = container.clientWidth;
    const newH = container.clientHeight;
    if (!newW || !newH) return;
    camera.aspect = newW / newH;
    camera.updateProjectionMatrix();
    renderer.setSize(newW, newH);
    updateScrollProgress();
  });
  ro.observe(container);
  window.addEventListener('resize', updateScrollProgress);

  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  const clock = new THREE.Clock();
  let running = true;
  let frameId;

  function tick() {
    if (!running) return;
    const t = clock.getElapsedTime();

    // Damped scroll
    smoothProgress += (targetProgress - smoothProgress) * CONFIG.scrollDamping;

    // Panel tracking — visibly sweep through the day across the
    // cinematic, with a tighter "live tracking" gesture during the
    // close-up segment. This sells the active-control product
    // (MPC tracker, physical engine resolves orientation).
    //
    // Sun position in the scene is upper-right (positive X), so:
    //   - early scroll  → panels tilt east-ish (face sun = +X)  → rotation.x ≈ +0.55
    //   - mid scroll    → panels flatter as "sun" reaches zenith   → rotation.x ≈ +0.15
    //   - late scroll   → panels tilt back west-ish                → rotation.x ≈ +0.45
    //   - very late     → settled                                   → rotation.x ≈ +0.30
    //
    // Layered on top: a small breathing wobble (~0.04 rad ≈ 2.3°)
    // that reads as live re-calibration. Close-up segment gets a
    // stronger gesture (visible 8° sweep over 4 seconds) so the
    // viewer can clearly see the panel adjust while in shot.
    let scrollTilt;
    const p = smoothProgress;
    if (p < 0.40)      scrollTilt = lerp(0.55, 0.18, smoothstep(p / 0.40));
    else if (p < 0.75) scrollTilt = lerp(0.18, 0.42, smoothstep((p - 0.40) / 0.35));
    else               scrollTilt = lerp(0.42, 0.30, smoothstep((p - 0.75) / 0.25));

    // Live re-calibration wobble — small, always present
    const wobble = Math.sin(t * 0.55) * 0.025;

    // Close-up segment (progress 0.55 → 0.85): amplify a clear sweep
    // so the on-camera panel is visibly tracking
    const closeUpStrength = Math.max(0, 1 - Math.abs(p - 0.72) / 0.18);
    const closeUpGesture = Math.sin(t * 0.85) * 0.075 * closeUpStrength;

    const tilt = scrollTilt + wobble + closeUpGesture;
    for (const tr of trackers) {
      tr.userData.pivot.rotation.x = tilt + tr.userData.tiltOffset;
    }

    // Sensor LEDs pulse
    for (const led of allLEDs) {
      const phase = t * 1.4 + led.userData.phase;
      led.material.emissiveIntensity = 0.45 + Math.sin(phase) * 0.3;
    }

    // Data layer — animates the telemetry visualization
    for (const obj of dataLayerObjects) {
      if (obj.kind === 'trackerLED') {
        const phase = t * 1.2 + obj.mesh.userData.phase;
        obj.mesh.material.emissiveIntensity = 0.5 + Math.sin(phase) * 0.4;
      } else if (obj.kind === 'trail') {
        // Each particle ascends, wraps when it reaches the top
        for (const p of obj.particles) {
          // Cycle: each particle's y goes 0 → height, then wraps
          // Use a sawtooth that increments with time then mods
          const cyclePos = ((t * obj.speed) + p.userData.basePhase) % 1.0;
          p.position.y = 0.3 + cyclePos * p.userData.height;
          // Fade out near the top
          p.material.opacity = (1 - cyclePos) * 0.75;
          // Slight horizontal drift for organic feel
          p.position.x = p.userData.originX + Math.sin(t * 0.7 + p.userData.basePhase * 6) * 0.05;
          p.position.z = p.userData.originZ + Math.cos(t * 0.6 + p.userData.basePhase * 6) * 0.05;
        }
      } else if (obj.kind === 'ripple') {
        // Expand outward, fade as it grows. Period ~3.5s.
        const period = 3.5;
        const cyclePos = ((t + obj.mesh.userData.phaseOffset) % period) / period;
        const radius = 0.4 + cyclePos * (obj.mesh.userData.maxRadius - 0.4);
        obj.mesh.scale.set(radius / 0.41, radius / 0.41, 1);
        obj.mesh.material.opacity = (1 - cyclePos) * 0.55;
      }
    }

    // Grain plant growth — driven by scroll progress, not time.
    // Sprouts between 0.55 and 0.80; full size after.
    // Plants grow with slight stagger so they don't all pop in unison.
    const baseGrowP = (smoothProgress - 0.55) / 0.25;
    grainPlants.forEach((plant, idx) => {
      const offset = idx * 0.06;  // small stagger per plant
      const localP = Math.max(0, Math.min(1, baseGrowP - offset));
      const eased = localP * localP * (3 - 2 * localP);   // smoothstep
      // Tiny "shoot up" gesture: Y grows slightly faster than XZ
      const sizeFactor = (idx === 0) ? 1.0 : (idx === 1 ? 0.85 : 0.78);
      const yScale = eased * sizeFactor;
      const xzScale = Math.max(0, (eased - 0.12) / 0.88) * sizeFactor;
      plant.scale.set(Math.max(0.001, xzScale), Math.max(0.001, yScale), Math.max(0.001, xzScale));
    });

    // Camera storyboard
    applyCameraForProgress(smoothProgress);

    // Subtle organic camera breathing — a barely-perceptible
    // micro-oscillation, like a hovering bird or a stabilized
    // drone. Amplitude scales down at altitude so it stays in
    // the "imperceptible" range at the high overhead shot and
    // becomes slightly more felt at low altitudes where it
    // gives the close-up shot a hand-held quality.
    const lowAltFactor = 1 - Math.min(1, camera.position.y / 35);
    const breathAmp = 0.04 + 0.10 * lowAltFactor;
    camera.position.x += Math.sin(t * 0.43) * breathAmp;
    camera.position.y += Math.cos(t * 0.51) * breathAmp * 0.4;
    camera.position.z += Math.sin(t * 0.37 + 1.2) * breathAmp * 0.7;

    // Overlays (dim, logo)
    applyOverlaysForProgress(smoothProgress);

    renderer.render(scene, camera);
    frameId = requestAnimationFrame(tick);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      running = false;
      if (frameId) cancelAnimationFrame(frameId);
    } else if (!running) {
      running = true;
      clock.getDelta();
      tick();
    }
  });

  // ============================================================
  // GO
  // ============================================================
  updateScrollProgress();
  tick();
})();
</script>

</body>
</html>
